<!DOCTYPE html>

<head>

<body class="bg-surface font-body text-on-surface">
    <!-- Header -->
    <header
        class="bg-white/70 backdrop-blur-[20px] dark:bg-[#131921]/70 docked full-width top-0 sticky z-50 shadow-[0px_12px_32px_rgba(19,25,33,0.06)] flex justify-between items-center w-full px-6 py-3 max-w-[100vw]">
        <div class="flex items-center gap-8">
            <span class="text-xl font-black text-[#131921] dark:text-white font-headline">MarketEngine</span>

        </div>
        <div class="flex items-center gap-4">
            <div class="relative flex items-center">
                <span class="material-symbols-outlined absolute left-3 text-on-surface-variant">search</span>
                <input
                    class="bg-surface-container-highest border-none rounded-xl pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-primary-container w-64"
                    placeholder="Search resources..." type="text" />
            </div>
            <button
                class="material-symbols-outlined text-on-surface hover:bg-slate-100 p-2 rounded-full transition-colors">notifications</button>
            <button
                class="material-symbols-outlined text-on-surface hover:bg-slate-100 p-2 rounded-full transition-colors">settings</button>
            <img alt="User profile" class="w-8 h-8 rounded-full border border-outline-variant/15"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCzHDu_GG8jA-rw2mD9lY_kwbgqXLBrT16pr6VedRUXIy4ewri6t41RyAN6ZJky9gyK0NrBpW1B1I2cIZ23ZsJlyNtLz3rgIcPk52VG70R6HUZWSmtFu11MD9xkYdYu-R6nUVmEcNcgSowhGOk9RFqrWaFdlj0wmY4SVXt6R20T7eUqCoO3ZmXe3Rb-WsHkQaN3CmNW9cZQwuf9p17AkonGyI9ibUOoKujD3tXPzIcedBkCtkViQU4Ys6ktUugGYlXWZ6AmjTOtVTz3" />
        </div>
    </header>

    <div class="flex">
        <!-- Sidebar Navigation -->
        <aside
            class="hidden md:flex flex-col h-screen w-64 fixed left-0 top-0 pt-16 bg-slate-50 dark:bg-[#131921] p-4 space-y-2 z-40">
            <div class="mb-8 px-2 py-4">
                
            </div>
            <nav class="flex-1 space-y-1">

                <a href="../ProductManagement/productmanagement.html"
                    class="flex items-center gap-3 px-3 py-2 text-slate-500 hover:bg-[#febd69]/10 transition-all rounded-md group">
                    <span class="material-symbols-outlined">inventory_2</span>
                    <span class="text-sm font-medium">Inventory</span>
                </a>
                <a href="adminorder.html"
                    class="flex items-center gap-3 px-3 py-2 bg-[#febd69] text-[#131921] rounded-md font-bold shadow-sm translate-x-1 duration-200">
                    <span class="material-symbols-outlined active-nav-link"
                        style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
                    <span class="text-sm">Orders</span>
                </a>

            </nav>
            <div class="border-t border-outline-variant/15 pt-4 space-y-1">
                <a class="flex items-center gap-3 px-3 py-2 text-slate-500 hover:bg-[#febd69]/10 transition-all rounded-md group"
                    href="#">
                    <span class="material-symbols-outlined">help</span>
                    <span class="text-sm font-medium">Support</span>
                </a>
                <a class="flex items-center gap-3 px-3 py-2 text-slate-500 hover:bg-[#febd69]/10 transition-all rounded-md group"
                    href="#">
                    <span class="material-symbols-outlined">settings</span>
                    <span class="text-sm font-medium">Settings</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 md:ml-64 bg-surface-container-low min-h-screen pb-20">
            <div class="max-w-7xl mx-auto px-6 py-8">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <nav class="flex items-center gap-2 text-sm text-on-secondary-container mb-2">
                            <span>Orders</span>
                            <span class="material-symbols-outlined text-xs">chevron_right</span>
                            <span class="font-semibold text-on-surface">Pending Orders</span>
                        </nav>
                        <h1 class="text-3xl font-black font-headline tracking-tight text-on-surface">Order Management
                        </h1>
                        <p class="text-on-surface-variant">View and manage all customer orders</p>
                    </div>
                    <div class="flex gap-3">
                        <button
                            class="px-6 py-2.5 rounded-xl bg-primary-container text-on-primary-fixed font-bold shadow-md active:scale-95 transition-transform">
                            <span class="material-symbols-outlined text-lg align-middle mr-1">refresh</span>
                            Refresh
                        </button>
                    </div>
                </div>

                <!-- Loading Indicator -->
                <div id="loadingIndicator" class="text-center py-12 hidden">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-primary-container">
                    </div>
                    <p class="mt-2 text-on-surface-variant">Loading orders...</p>
                </div>

                <!-- Orders Container -->
                <div id="ordersContainer" class="grid grid-cols-1 xl:grid-cols-2 gap-6">
                    <!-- Orders will be dynamically inserted here -->
                </div>
            </div>
        </main>
    </div>

    <script src="adminorder.js"></script>
</body>

</html>
