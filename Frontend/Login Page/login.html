<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Equinox Marketplace - Sign In</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="login.css">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#001f27",
                        "on-primary-container": "#774b00",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#fbba67",
                        "surface": "#f9f9f9",
                        "surface-variant": "#e2e2e2",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dadada",
                        "primary": "#845403",
                        "outline": "#837566",
                        "on-primary-fixed-variant": "#653e00",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#514538",
                        "primary-container": "#febd69",
                        "on-primary-fixed": "#2a1700",
                        "surface-tint": "#845403",
                        "surface-container-high": "#e8e8e8",
                        "tertiary": "#00677d",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#c1c7d2",
                        "on-tertiary-container": "#005c6f",
                        "on-secondary-fixed": "#161c24",
                        "on-primary": "#ffffff",
                        "background": "#f9f9f9",
                        "primary-fixed": "#ffddb7",
                        "on-background": "#1a1c1c",
                        "tertiary-fixed": "#b2ebff",
                        "secondary": "#595f68",
                        "inverse-on-surface": "#f1f1f1",
                        "tertiary-container": "#7dd5f0",
                        "on-tertiary-fixed-variant": "#004e5e",
                        "on-surface": "#1a1c1c",
                        "surface-container-low": "#f3f3f3",
                        "surface-bright": "#f9f9f9",
                        "on-secondary-container": "#5d636d",
                        "tertiary-fixed-dim": "#7ad3ed",
                        "inverse-primary": "#fbba67",
                        "inverse-surface": "#2f3131",
                        "on-error": "#ffffff",
                        "outline-variant": "#d5c4b2",
                        "secondary-container": "#dae0eb",
                        "secondary-fixed": "#dde3ee",
                        "surface-container-highest": "#e2e2e2",
                        "surface-container": "#eeeeee",
                        "on-secondary-fixed-variant": "#414750"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Public Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-white min-h-screen flex flex-col justify-between items-center selection:bg-primary-container/30">

    <main class="flex-grow flex flex-col items-center justify-center w-full px-6 py-12">
        <div class="mb-8 text-center">
            <a href="../Home page/home.html"
                class="text-2xl font-black text-slate-900 tracking-tighter font-headline">MarketEngine</a>
        </div>

        <div
            class="w-full max-w-md bg-surface-container-lowest p-10 rounded-xl shadow-[0px_12px_32px_rgba(19,25,33,0.06)] border border-outline-variant/10">
            <h2 class="text-2xl font-bold text-on-surface mb-8 headline-sm">Sign In</h2>
            <form id="loginForm" class="space-y-6">
                <div class="space-y-1.5">
                    <label class="text-sm font-semibold text-on-surface-variant label-md" for="identifier">Email or
                        mobile phone number</label>
                    <input
                        class="w-full px-4 py-3 bg-surface-container-low border-transparent focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none rounded-lg text-on-surface"
                        id="identifier" name="identifier" placeholder="" type="text" />
                </div>
                <div class="space-y-1.5">
                    <div class="flex justify-between items-center">
                        <label class="text-sm font-semibold text-on-surface-variant label-md"
                            for="password">Password</label>
                        <a class="text-sm text-primary hover:underline font-medium" href="#">Forgot Password?</a>
                    </div>
                    <input
                        class="w-full px-4 py-3 bg-surface-container-low border-transparent focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none rounded-lg text-on-surface"
                        id="password" name="password" placeholder="" type="password" />
                </div>
                <button
                    class="w-full bg-primary-container hover:bg-[#fcae4b] text-on-primary-fixed font-bold py-3.5 px-4 rounded-lg flex items-center justify-center gap-2 transition-all transform active:scale-[0.98] shadow-sm"
                    type="submit">
                    <span class="material-symbols-outlined"
                        style="font-variation-settings: 'FILL' 1; font-size: 20px;">lock</span>
                    Sign In
                </button>
            </form>

            <div class="mt-10 pt-6 border-t border-outline-variant/10 text-center">
                <p class="text-sm text-on-secondary-container">New to Equinox Marketplace?</p>
                <button
                    class="mt-4 w-full py-2.5 px-4 bg-surface-container-high hover:bg-surface-container-highest text-on-surface font-semibold rounded-lg transition-colors text-sm">
                    Create your account
                </button>
            </div>
        </div>
    </main>

    <footer class="w-full py-12 bg-neutral-50 dark:bg-neutral-950 border-t border-neutral-100 dark:border-neutral-800">
        <div class="flex flex-col md:flex-row justify-between items-center px-8 max-w-7xl mx-auto w-full">
            <div class="mb-6 md:mb-0">
                <p class="font-inter text-sm label-md text-neutral-600 dark:text-neutral-400">
                    © 2024 Equinox Marketplace. All rights reserved.
                </p>
            </div>
            <div class="flex flex-wrap justify-center gap-x-8 gap-y-4">
                <a class="font-inter text-sm label-md text-neutral-600 dark:text-neutral-400 hover:underline hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors"
                    href="#">Privacy Policy</a>
                <a class="font-inter text-sm label-md text-neutral-600 dark:text-neutral-400 hover:underline hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors"
                    href="#">Terms of Service</a>
                <a class="font-inter text-sm label-md text-neutral-600 dark:text-neutral-400 hover:underline hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors"
                    href="#">Help Center</a>
                <a class="font-inter text-sm label-md text-neutral-600 dark:text-neutral-400 hover:underline hover:text-neutral-900 dark:hover:text-neutral-100 transition-colors"
                    href="#">Cookies</a>
            </div>
        </div>
    </footer>

    <script src="login.js"></script>

</body>

</html>
